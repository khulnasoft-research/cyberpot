# Docker Installation Role for CyberPot
# Installs and configures Docker for CyberPot deployment

- name: Add Docker GPG key
  get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'

- name: Add Docker repository
  apt_repository:
    repo: "deb [arch={{ ansible_architecture }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present
    filename: docker

- name: Update apt cache after adding Docker repository
  apt:
    update_cache: yes

- name: Install Docker packages
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present

- name: Create Docker daemon configuration directory
  file:
    path: /etc/docker
    state: directory
    mode: '0755'

- name: Configure Docker daemon for CyberPot
  copy:
    dest: /etc/docker/daemon.json
    content: |
      {
        "log-driver": "json-file",
        "log-opts": {
          "max-size": "100m",
          "max-file": "3"
        },
        "storage-driver": "overlay2",
        "iptables": false,
        "bridge": "none",
        "data-root": "/var/lib/docker",
        "exec-opts": ["native.cgroupdriver=systemd"],
        "default-ulimits": {
          "nofile": {
            "Name": "nofile",
            "Hard": 65536,
            "Soft": 65536
          }
        },
        "registry-mirrors": [
          "https://mirror.gcr.io",
          "https://registry.docker-cn.com",
          "https://docker.mirrors.ustc.edu.cn"
        ]
      }
  notify: restart docker

- name: Start and enable Docker service
  systemd:
    name: docker
    state: started
    enabled: yes
    daemon_reload: yes

- name: Add CyberPot user to Docker group
  user:
    name: "{{ cyberpot_user | default('cyberpot') }}"
    groups: docker
    append: yes

- name: Create Docker Compose wrapper script
  copy:
    dest: /usr/local/bin/docker-compose
    content: |
      #!/bin/bash
      # Wrapper script for Docker Compose to ensure proper execution
      exec /usr/bin/docker compose "$@"
    mode: '0755'

- name: Install Docker Python library for Ansible
  pip:
    name: docker
    state: present

- name: Verify Docker installation
  command: docker --version
  register: docker_version
  changed_when: false

- name: Display Docker version
  debug:
    msg: "Docker installed: {{ docker_version.stdout }}"

- name: Test Docker functionality
  docker_container:
    name: test-container
    image: hello-world
    state: started
    auto_remove: yes
    detach: no
  register: docker_test
  failed_when: false

- name: Clean up test container
  docker_container:
    name: test-container
    state: absent
  when: docker_test is succeeded

- name: Configure Docker cleanup cron job
  cron:
    name: "Docker Cleanup"
    minute: "0"
    hour: "3"
    job: "docker container prune -f && docker image prune -f && docker volume prune -f"
    user: root

- name: Create Docker monitoring script
  copy:
    dest: "{{ cyberpot_base_dir | default('/home/cyberpot') }}/scripts/docker-monitor.sh"
    content: |
      #!/bin/bash
      # Docker monitoring script for CyberPot
      echo "=== Docker System Information ==="
      docker system df

      echo -e "\n=== Docker Containers Status ==="
      docker ps -a --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}\t{{.Size}}"

      echo -e "\n=== Docker Images ==="
      docker images --format "table {{.Repository}}\t{{.Tag}}\t{{.Size}}\t{{.CreatedAt}}"

      echo -e "\n=== Container Logs (Recent) ==="
      docker compose logs --tail=10 2>/dev/null || echo "No compose logs found"
    mode: '0755'

handlers:
  - name: restart docker
    systemd:
      name: docker
      state: restarted
