# System Hardening Role for CyberPot
# Secures the base operating system before CyberPot installation

- name: Update system packages
  apt:
    upgrade: dist
    update_cache: yes

- name: Install essential security packages
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - software-properties-common
      - ufw
      - fail2ban
      - auditd
      - rkhunter
      - unattended-upgrades
      - needrestart
      - debsums
    state: present

- name: Configure automatic security updates
  copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Download-Upgradeable-Packages "1";
      APT::Periodic::AutocleanInterval "7";
      APT::Periodic::Unattended-Upgrade "1";

- name: Configure unattended upgrades
  copy:
    dest: /etc/apt/apt.conf.d/50unattended-upgrades
    content: |
      Unattended-Upgrade::Allowed-Origins {
          "${distro_id}:${distro_codename}";
          "${distro_id}:${distro_codename}-security";
          "${distro_id}ESM:${distro_codename}";
      };
      Unattended-Upgrade::Package-Blacklist {
      };
      Unattended-Upgrade::DevRelease "false";
      Unattended-Upgrade::Remove-Unused-Kernel-Packages "true";
      Unattended-Upgrade::Remove-Unused-Dependencies "true";

- name: Configure SSH daemon
  copy:
    dest: /etc/ssh/sshd_config
    content: |
      # CyberPot SSH Configuration
      Port {{ ssh_port | default(64295) }}
      Protocol 2
      HostKey /etc/ssh/ssh_host_rsa_key
      HostKey /etc/ssh/ssh_host_ecdsa_key
      HostKey /etc/ssh/ssh_host_ed25519_key

      # Security settings
      PermitRootLogin no
      PasswordAuthentication no
      PubkeyAuthentication yes
      ChallengeResponseAuthentication no
      UsePAM yes
      X11Forwarding no
      PrintMotd no
      AcceptEnv LANG LC_*
      Subsystem sftp /usr/lib/openssh/sftp-server

      # Logging
      SyslogFacility AUTH
      LogLevel VERBOSE

      # Security hardening
      MaxAuthTries 3
      MaxStartups 3:30:10
      LoginGraceTime 30
      ClientAliveInterval 300
      ClientAliveCountMax 2
      StrictModes yes
      AllowTcpForwarding no
      PermitTunnel no
  notify: restart ssh

- name: Disable SSH password authentication for root
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PermitRootLogin'
    line: 'PermitRootLogin no'

- name: Configure sudo for CyberPot user
  copy:
    dest: /etc/sudoers.d/cyberpot
    content: |
      # Allow CyberPot user to run Docker commands
      {{ cyberpot_user | default('cyberpot') }} ALL=(ALL) NOPASSWD: /usr/bin/docker, /usr/bin/docker-compose, /bin/systemctl start cyberpot, /bin/systemctl stop cyberpot, /bin/systemctl restart cyberpot, /bin/systemctl status cyberpot
    mode: '0440'

- name: Configure auditd for security monitoring
  copy:
    dest: /etc/audit/auditd.conf
    content: |
      log_file = /var/log/audit/audit.log
      log_format = RAW
      log_group = root
      priority_boost = 4
      flush = INCREMENTAL
      freq = 20
      num_logs = 5
      dispense = 5
      max_log_file = 20
      max_log_file_action = ROTATE
      space_left = 75
      space_left_action = SYSLOG
      action_mail_acct = root
      admin_space_left = 50
      admin_space_left_action = SUSPEND
      disk_full_action = SUSPEND
      disk_error_action = SUSPEND
  notify: restart auditd

- name: Configure rkhunter for rootkit detection
  copy:
    dest: /etc/rkhunter.conf.local
    content: |
      # CyberPot specific configuration
      ALLOW_SSH_ROOT_USER=no
      ALLOW_SSH_PROT_V1=no
      SCRIPTWHITELIST=/usr/bin/lwp-request
      SCRIPTWHITELIST=/usr/bin/unhide.rb
      PHALANX2_DIRTEST=1
      ALLOWHIDDENFILE=/etc/.etckeeper
      ALLOWHIDDENFILE=/var/lib/dpkg/.keep

- name: Configure logrotate for security logs
  copy:
    dest: /etc/logrotate.d/security-logs
    content: |
      /var/log/auth.log
      /var/log/secure
      /var/log/audit/audit.log {
          daily
          rotate 30
          compress
          delaycompress
          missingok
          notifempty
          create 640 root adm
          postrotate
              service rsyslog rotate >/dev/null 2>&1 || true
          endscript
      }

- name: Configure sysctl for security hardening
  copy:
    dest: /etc/sysctl.d/99-cyberpot-security.conf
    content: |
      # CyberPot Security Hardening
      net.ipv4.ip_forward = 0
      net.ipv4.conf.all.send_redirects = 0
      net.ipv4.conf.default.send_redirects = 0
      net.ipv4.conf.all.accept_redirects = 0
      net.ipv4.conf.default.accept_redirects = 0
      net.ipv4.conf.all.secure_redirects = 0
      net.ipv4.conf.default.secure_redirects = 0
      net.ipv4.conf.all.log_martians = 1
      net.ipv4.conf.default.log_martians = 1
      net.ipv4.icmp_echo_ignore_broadcasts = 1
      net.ipv4.icmp_ignore_bogus_error_responses = 1
      net.ipv4.conf.all.rp_filter = 1
      net.ipv4.conf.default.rp_filter = 1
      net.ipv6.conf.all.disable_ipv6 = 1
      net.ipv6.conf.default.disable_ipv6 = 1
      kernel.randomize_va_space = 2
      kernel.kptr_restrict = 2
      kernel.dmesg_restrict = 1
      kernel.sysrq = 0
      kernel.core_uses_pid = 1
      kernel.kexec_load_disabled = 1
      fs.protected_hardlinks = 1
      fs.protected_symlinks = 1
      fs.suid_dumpable = 0
  notify: reload sysctl

- name: Create CyberPot user and group
  group:
    name: "{{ cyberpot_group | default('cyberpot') }}"
    state: present

- name: Create CyberPot user
  user:
    name: "{{ cyberpot_user | default('cyberpot') }}"
    group: "{{ cyberpot_group | default('cyberpot') }}"
    system: yes
    shell: /bin/bash
    create_home: yes
    home: "{{ cyberpot_base_dir | default('/home/cyberpot') }}"

- name: Set up user directories with proper permissions
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ cyberpot_user | default('cyberpot') }}"
    group: "{{ cyberpot_group | default('cyberpot') }}"
    mode: '0750'
  loop:
    - "{{ cyberpot_base_dir | default('/home/cyberpot') }}"
    - "{{ cyberpot_base_dir | default('/home/cyberpot') }}/cyberpot"
    - "{{ cyberpot_base_dir | default('/home/cyberpot') }}/backups"
    - "{{ cyberpot_base_dir | default('/home/cyberpot') }}/scripts"

- name: Configure fail2ban for SSH protection
  copy:
    dest: /etc/fail2ban/jail.local
    content: |
      [DEFAULT]
      bantime = 3600
      findtime = 600
      maxretry = 3
      backend = auto
      destemail = root@localhost

      [sshd]
      enabled = true
      port = {{ ssh_port | default(64295) }}
      filter = sshd
      logpath = /var/log/auth.log
      maxretry = 3
      bantime = 3600

      [cyberpot-webui]
      enabled = true
      port = {{ web_port | default(64297) }}
      filter = apache-auth
      logpath = /var/log/apache2/access.log
      maxretry = 5
      bantime = 1800

- name: Enable fail2ban service
  systemd:
    name: fail2ban
    enabled: yes
    state: started

- name: Set up cron job for security updates
  cron:
    name: "Security Updates Check"
    minute: "0"
    hour: "6"
    job: "apt-get update && apt-get upgrade -y -q"
    user: root

handlers:
  - name: restart ssh
    systemd:
      name: ssh
      state: restarted

  - name: restart auditd
    systemd:
      name: auditd
      state: restarted

  - name: reload sysctl
    command: sysctl --system
