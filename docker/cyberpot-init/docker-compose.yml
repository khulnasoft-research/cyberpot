services:

# CyberPot Init Service
  cyberpot-init:
    build: .
    container_name: cyberpot-init
    env_file:
      - $HOME/cyberpot/.env
    restart: "no"
    stop_grace_period: 60s
    image: "ghcr.io/khulnasoft/cyberpot-init:24.04.1"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - $HOME/cyberpot/data:/data
    network_mode: "host"
    cap_add:
     - NET_ADMIN
